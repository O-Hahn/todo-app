apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: todo-oh-build
  namespace: todo-oh
  labels:
    name: todo-oh-build
    app: todo-oh
spec:
  triggers:
    - type: GitHub
      github:
        secret: secret101
    - type: ImageChange
      imageChange: {}
    - type: ConfigChange
  source:
    type: Git
    git:
      uri: https://github.com/rpailer/todo-app.git
      ref: cloudant
    contextDir: 
  strategy:
    type: Docker                      
    dockerStrategy:
      dockerfilePath: Dockerfile    # Look for Dockerfile in: gitUri/contextDir/dockerfilePath
  output:
    to:
      kind: ImageStreamTag
      name: todo-oh:latest